database:
  batch_size: 25000
  statement_timeout_ms: 240000

data:
  raw_dir: data/raw
  prepared_dir: data/prepared
  dedup_db: data/dedup.sqlite3
  state_file: data/extract-state.json
  train_fraction: 0.70
  validation_fraction: 0.15
  require_exactly_eight_cards: true
  allowed_modes: [ladder, ranked]
  # Leave null to avoid treating raw API levels as comparable across rarities.
  max_raw_average_level_difference: null
  trophy_buckets: [0, 5000, 7000, 9000, 12000, 99999]
  top_ladder_buckets: [100, 1000, 10000]
  # Optional dotted callable: "my_package.my_prior:predict".
  # It receives the parsed record and returns P(team wins) from your matrix.
  matrix_prior_provider: null
  # App repo used by `rigged-matchup attach-prior` to reuse the live empirical
  # matchup classification rules instead of duplicating them in Python.
  empirical_app_dir: ../riggedroyale

model:
  embedding_dim: 64
  hidden_dim: 192
  dropout: 0.15
  max_evolution_level: 5
  max_hero_level: 5
  # Highest real card elixir cost; sizes the per-card elixir embedding.
  max_elixir: 9
  # Weight on the empirical matrix logit. 0.0 ignores the prior entirely (the
  # network learns from cards only). To actually USE an attached matrix prior,
  # run `attach-prior` then set matrix_prior_learnable: true (recommended) or a
  # fixed strength > 0. With a constant 0.5 prior this has no effect.
  matrix_prior_strength: 0.0
  matrix_prior_learnable: false
  use_cross_card_interactions: true
  use_intra_deck_synergies: true
  card_dropout: 0.05
  use_matchup_transformer: true
  transformer_layers: 1
  transformer_heads: 4
  use_segment_adapters: true
  # Learned oriented card-vs-card interaction (A counters B) instead of a plain
  # symmetric Hadamard product. Initialised to identity, learns from win/loss.
  use_bilinear_cross: true

training:
  seed: 42
  epochs: 10
  batch_size: 2048
  evaluation_batch_size: 4096
  gradient_accumulation_steps: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 2
  gradient_clip_norm: 2.0
  early_stopping_patience: 3
  segment_calibration_min_rows: 2000
  # Linear warmup fraction then cosine decay of the learning rate.
  warmup_fraction: 0.05
  # Soft targets toward 0.5. Win/loss labels are very noisy; a little smoothing
  # reduces over-confidence and improves Brier/calibration.
  label_smoothing: 0.02
  device: auto
  artifact_dir: artifacts

evaluation:
  bad_threshold: 0.40
  neutral_low: 0.45
  neutral_high: 0.55
  good_threshold: 0.60
  calibration_bins: 15
  # Bootstrap resamples for confidence intervals on AUC/Brier/log-loss/accuracy.
  # Essential on small unseen-matchup splits. Set 0 to disable.
  bootstrap_samples: 300
